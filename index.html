<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>신나는 복습게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:      #1a1612;
      --bg:       #fdf5d8;
      --yellow:   #f0c030;
      --sky:      #aadff5;
      --coral:    #e8654a;
      --mint:     #40c898;
      --lilac:    #a888f0;
      --white:    #ffffff;
      --t1:       #4a90d9;
      --t1-light: #d6eaf8;
      --t1-dark:  #2c6aa0;
      --t2:       #e05a3a;
      --t2-light: #fde8e2;
      --t2-dark:  #b03a20;
      --border:   3px solid var(--ink);
      --border3:  2px solid var(--ink);
      --shadow:   4px 4px 0 var(--ink);
      --shadow3:  3px 3px 0 var(--ink);
      --radius:   10px;
      --ff-title: 'Bangers', 'Jua', sans-serif;
      --ff-body:  'Jua', 'Noto Sans KR', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow: hidden;
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(0,0,0,0.055) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
      color: var(--ink);
      font-family: var(--ff-body);
    }

    button { font-family: var(--ff-body); font-weight: 400; border: 0; cursor: pointer; color: var(--ink); background: none; }

    .app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      padding: clamp(14px, 2vw, 28px);
    }
    .screen.active { display: flex; }

    /* ── START ── */
    .title {
      position: absolute;
      top: 13vh; left: 50%; transform: translateX(-50%);
      width: min(94vw, 1100px);
      text-align: center;
      font-family: var(--ff-title);
      font-size: clamp(52px, 9vw, 112px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--yellow);
      -webkit-text-stroke: 4px var(--ink);
      paint-order: stroke fill;
      filter: drop-shadow(4px 4px 0 var(--ink));
      line-height: 1;
    }

    .title-sub {
      position: absolute;
      top: calc(13vh + clamp(60px, 11vw, 136px));
      left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--yellow);
      font-family: var(--ff-body);
      font-size: clamp(13px, 1.5vw, 19px); font-weight: 400;
      letter-spacing: 0.18em; padding: 4px 18px; border-radius: 4px;
      white-space: nowrap;
    }

    .start-actions {
      display: flex; align-items: center; justify-content: center;
      gap: clamp(20px, 4.5vw, 52px);
    }

    .play-button {
      width: clamp(122px, 14vw, 168px); aspect-ratio: 1;
      border-radius: 50%; background: var(--yellow);
      border: 3px solid var(--ink); box-shadow: 5px 5px 0 var(--ink);
      display: grid; place-items: center;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .play-button::before {
      content: ""; margin-left: 12%;
      width: 0; height: 0;
      border-top: 30px solid transparent; border-bottom: 30px solid transparent;
      border-left: 50px solid var(--ink);
    }
    .play-button:hover  { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    .play-button:active { transform: translate(3px,3px);   box-shadow: 2px 2px 0 var(--ink); }

    .practice-button {
      width: clamp(84px, 10vw, 120px); aspect-ratio: 1; border-radius: 50%;
      background: var(--sky); border: 3px solid var(--ink); box-shadow: var(--shadow);
      font-size: clamp(18px, 2.2vw, 28px); font-weight: 400;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .practice-button:hover  { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    .practice-button:active { transform: translate(3px,3px);   box-shadow: 2px 2px 0 var(--ink); }

    /* ── SHARED ── */
    .panel {
      width: min(1060px, 93vw); max-height: 88vh;
      border: var(--border); border-radius: var(--radius);
      background: var(--white); box-shadow: var(--shadow);
      padding: clamp(18px, 2.4vw, 36px);
    }

    .panel-title {
      text-align: center; font-family: var(--ff-title);
      font-size: clamp(28px, 4vw, 52px); font-weight: 400; letter-spacing: 0.03em;
      margin-bottom: 20px;
    }

    .primary {
      min-width: 190px; min-height: 52px; padding: 0 30px;
      border-radius: var(--radius); background: var(--yellow);
      border: var(--border); box-shadow: var(--shadow);
      font-family: var(--ff-body); font-size: clamp(16px, 1.8vw, 23px); font-weight: 400;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .primary:hover  { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    .primary:active { transform: translate(3px,3px);   box-shadow: 2px 2px 0 var(--ink); }

    .exit-button {
      min-width: 150px; min-height: 48px; padding: 0 26px;
      border-radius: var(--radius); background: var(--white);
      border: var(--border); box-shadow: var(--shadow);
      font-size: clamp(15px, 1.6vw, 21px); font-weight: 400;
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
    }
    .exit-button:hover  { background: var(--coral); transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    .exit-button:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--ink); }

    /* ── PRACTICE ── */
    .practice-layout {
      width: min(960px, 90vw); min-height: 70vh;
      display: grid; grid-template-rows: auto 1fr auto;
      gap: 22px; align-items: center; justify-items: center;
    }
    .practice-card {
      width: min(660px, 80vw); min-height: 300px;
      border: var(--border); border-radius: var(--radius);
      background: var(--white); box-shadow: var(--shadow);
      display: grid; grid-template-rows: 1fr auto 1fr;
      gap: 14px; align-items: center; justify-items: center;
      padding: clamp(26px, 4vw, 50px); text-align: center;
    }
    .practice-word { font-family: var(--ff-body); font-size: clamp(36px, 5.5vw, 76px); font-weight: 400; word-break: keep-all; }
    .practice-dash { width: min(200px, 38vw); height: 4px; border-radius: 999px; background: var(--ink); }
    .practice-count { font-size: clamp(15px, 1.8vw, 22px); font-weight: 400; opacity: 0.5; }
    .practice-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: clamp(48px, 6vw, 68px); aspect-ratio: 1; border-radius: 50%;
      background: var(--white); border: var(--border); box-shadow: var(--shadow);
      font-size: clamp(26px, 3.5vw, 44px); font-weight: 400;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .practice-nav:hover  { transform: translateY(-50%) translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    .practice-nav:active { transform: translateY(-50%) translate(3px,3px);   box-shadow: 2px 2px 0 var(--ink); }
    .practice-nav.prev { left: clamp(12px, 3.5vw, 52px); }
    .practice-nav.next { right: clamp(12px, 3.5vw, 52px); }

    /* ── ABSENCE ── */
    .absence-panel { display: grid; grid-template-rows: auto 1fr auto; gap: 18px; }
    .roster { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 9px; align-content: start; }
    .person {
      min-height: 50px; border: var(--border3); border-radius: var(--radius);
      box-shadow: var(--shadow3); font-size: clamp(13px, 1.5vw, 20px); font-weight: 400;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.1s, background 0.1s;
    }
    .person.male   { background: var(--sky); }
    .person.female { background: #f7c8dc; }
    .person:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
    .person.absent { transform: scale(0.9); background: #e0e0e0; opacity: 0.55; box-shadow: none; }

    /* ── WIPE ── */
    .wipe {
      position: absolute; left: -105vw; top: 50%; width: 100vw; height: 130px;
      transform: translateY(-50%); background: var(--yellow);
      border-top: var(--border); border-bottom: var(--border);
      color: var(--ink); display: grid; place-items: center;
      font-family: var(--ff-title); font-size: clamp(28px, 5vw, 62px); letter-spacing: 0.075em;
      z-index: 20;
    }
    .wipe.team-one { background: var(--t1); border-color: var(--t1-dark); color: var(--white); }
    .wipe.team-two { background: var(--t2); border-color: var(--t2-dark); color: var(--white); }
    .wipe.enter { animation: wipeIn  0.2s ease forwards; }
    .wipe.exit  { animation: wipeOut 0.2s ease forwards; }
    @keyframes wipeIn  { from { left:-105vw; } to { left:0; } }
    @keyframes wipeOut { from { left:0; } to { left:105vw; } }

    /* ── TEAMS ── */
    .teams-wrap {
      width: min(1080px, 93vw); display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 3vw, 38px); transform: translateY(-120vh); transition: transform 0.22s ease;
    }
    .teams-wrap.down { transform: translateY(0); }
    .teams-wrap.up   { transform: translateY(-120vh); }
    .team-box {
      min-height: 58vh; border: var(--border); border-radius: var(--radius);
      background: var(--white); box-shadow: var(--shadow);
      padding: clamp(14px, 2vw, 26px); display: grid; grid-template-rows: auto 1fr; gap: 16px;
    }
    .team-box:nth-child(1) { border-color: var(--t1-dark); box-shadow: 4px 4px 0 var(--t1-dark); }
    .team-box:nth-child(2) { border-color: var(--t2-dark); box-shadow: 4px 4px 0 var(--t2-dark); }
    .team-box:nth-child(1) h2 { color: var(--t1); }
    .team-box:nth-child(2) h2 { color: var(--t2); }
    .team-box h2 {
      text-align: center; font-family: var(--ff-title);
      font-size: clamp(30px, 4.5vw, 60px); font-weight: 400; letter-spacing: 0.04em;
    }
    .team-list {
      display: grid; grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px; align-content: start; font-size: clamp(14px, 1.7vw, 22px); font-weight: 400;
    }
    .team-member {
      padding: 10px 11px; border-radius: var(--radius);
      border: var(--border3); background: var(--bg);
      text-align: center; box-shadow: var(--shadow3);
    }
    .team-member.team-leader { background: var(--yellow); }
    .team-box:nth-child(1) .team-member { border-color: rgba(74,144,217,0.3); }
    .team-box:nth-child(2) .team-member { border-color: rgba(224,90,58,0.3); }
    .team-box:nth-child(1) .team-member.team-leader { background: var(--t1-light); border-color: var(--t1); color: var(--t1-dark); }
    .team-box:nth-child(2) .team-member.team-leader { background: var(--t2-light); border-color: var(--t2); color: var(--t2-dark); }

    .bottom-action {
      position: absolute; bottom: 5.5vh; left: 50%; transform: translateX(-50%);
      opacity: 0; pointer-events: none; transition: opacity 0.18s ease; z-index: 45;
    }
    .bottom-action.show { opacity: 1; pointer-events: auto; }

    /* ── RULES ── */
    .rules-panel { transform: translateY(-120vh); transition: transform 0.2s ease; font-size: clamp(17px, 2.2vw, 28px); line-height: 1.55; font-weight: 400; }
    .rules-panel.down { transform: translateY(0); }
    .rules-panel ol { list-style: none; counter-reset: rule; display: grid; gap: 11px; }
    .rules-panel ol li {
      counter-increment: rule; display: flex; gap: 14px; align-items: flex-start;
      padding: 13px 16px; border: var(--border3); border-radius: var(--radius);
      background: var(--bg); box-shadow: var(--shadow3);
    }
    .rules-panel ol li::before {
      content: counter(rule); min-width: 32px; min-height: 32px; border-radius: 50%;
      background: var(--yellow); border: 3px solid var(--ink);
      font-family: var(--ff-title); font-weight: 400; font-size: 1.05em;
      display: grid; place-items: center; flex-shrink: 0; margin-top: 1px;
    }

    /* ── GAME ── */
    .game-layout {
      width: min(1220px, 96vw); height: min(91vh, 890px);
      display: grid; grid-template-rows: 88px 1fr 62px; gap: 10px; align-items: center;
    }
    .turn-message {
      text-align: center; font-family: var(--ff-body);
      min-height: 78px;
      font-size: clamp(25px, 3.2vw, 46px); font-weight: 400;
      letter-spacing: 0.045em;
      background: var(--yellow); border: var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; padding: 0 34px;
      transition: background 0.22s, border-color 0.22s, box-shadow 0.22s;
    }
    .turn-message.team-one { background: var(--t1-light); border-color: var(--t1-dark); box-shadow: 4px 4px 0 var(--t1-dark); }
    .turn-message.team-two { background: var(--t2-light); border-color: var(--t2-dark); box-shadow: 4px 4px 0 var(--t2-dark); }

    .turn-band {
      position: absolute; left: 50%; top: 50%; width: 122vw; height: 126px;
      transform: translate(-50%,-50%) rotate(-3deg);
      border-top: 4px solid var(--ink); border-bottom: 4px solid var(--ink);
      color: var(--white); display: grid; place-items: center;
      font-family: var(--ff-title); font-size: clamp(30px, 5vw, 62px); letter-spacing: 0.085em;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.25);
      filter: drop-shadow(0 7px 0 rgba(26,22,18,0.35));
      z-index: 28; pointer-events: none; opacity: 0;
    }
    .turn-band.team-one { background: #246fb8; border-color: var(--ink); }
    .turn-band.team-two { background: #c94324; border-color: var(--ink); transform: translate(-50%,-50%) rotate(3deg); }
    .turn-band.show { animation: turnBandFill 1.5s ease forwards; }
    .turn-band.team-two.show { animation-name: turnBandFillReverse; }
    @keyframes turnBandFill {
      0%   { opacity:0; clip-path:inset(0 100% 0 0); }
      12%  { opacity:1; clip-path:inset(0 0% 0 0); }
      85%  { opacity:1; clip-path:inset(0 0% 0 0); }
      100% { opacity:0; clip-path:inset(0 0% 0 100%); }
    }
    .turn-band.team-two.show { animation-name: turnBandFillReverse; }
    @keyframes turnBandFillReverse {
      0%   { opacity:0; clip-path:inset(0 0% 0 100%); }
      12%  { opacity:1; clip-path:inset(0 0% 0 0); }
      85%  { opacity:1; clip-path:inset(0 0% 0 0); }
      100% { opacity:0; clip-path:inset(0 100% 0 0); }
    }

    /* ── CARD GRID ── */
    .card-grid {
      display: grid; grid-template-columns: repeat(8, minmax(0,1fr)); grid-template-rows: repeat(5, minmax(0,1fr));
      gap: clamp(5px, 0.8vw, 10px); width: 100%; height: 100%; min-height: 0;
    }

    .memory-card {
      position: relative; display: grid; place-items: center;
      border: 3px solid var(--ink); border-radius: var(--radius);
      background: var(--sky);
      background-image: repeating-linear-gradient(-45deg, transparent 0 8px, rgba(255,255,255,0.28) 8px 10px);
      box-shadow: 4px 4px 0 var(--ink);
      font-family: var(--ff-title); font-size: clamp(18px, 2.5vw, 36px); font-weight: 400; letter-spacing: 0.02em;
      color: var(--ink); overflow: hidden; cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .memory-card:hover:not(.locked):not(.revealed) { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
    .memory-card:active:not(.locked):not(.revealed) { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }
    .memory-card.locked { cursor: default; }
    .memory-card.deal-ready { opacity:0; transform:translateY(-120vh) rotate(-10deg); }
    .memory-card.dealt { animation: cardDealDrop 0.28s cubic-bezier(.17,.88,.24,1.12) forwards; }
    @keyframes cardDealDrop {
      0%   { opacity:0; transform:translateY(-120vh) rotate(-10deg); }
      72%  { opacity:1; transform:translateY(6px) rotate(2deg); }
      100% { opacity:1; transform:translateY(0) rotate(0); }
    }
    .memory-card.selected::after {
      content: ""; position: absolute; inset: 4px; border-radius: 6px;
      border: 4px solid var(--select-color);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.7), inset 0 0 0 2px rgba(255,255,255,0.5);
      pointer-events: none;
    }
    .memory-card.selected-first  { --select-color: #ff4500; }
    .memory-card.selected-second { --select-color: #1a6fff; }
    .memory-card.revealed {
      background: var(--white); background-image: none; border-color: var(--ink);
      font-family: var(--ff-body); font-size: clamp(10px, 1.05vw, 16px); font-weight: 400;
      letter-spacing: 0; padding: 6px; text-align: center; word-break: keep-all; line-height: 1.22;
      box-shadow: 3px 3px 0 var(--ink);
    }

    /* ── SCOREBOARD ── */
    .scoreboard { min-height: 58px; display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    .score { border: var(--border); border-radius: var(--radius); background: var(--white); box-shadow: var(--shadow);
      display: flex; justify-content: space-between; align-items: center; padding: 6px 16px;
      font-family: var(--ff-body); font-size: clamp(16px, 1.8vw, 26px); font-weight: 400;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    }
    #scoreBox0 { border-color: var(--t1-dark); box-shadow: 4px 4px 0 var(--t1-dark); }
    #scoreBox1 { border-color: var(--t2-dark); box-shadow: 4px 4px 0 var(--t2-dark); }
    #scoreBox0.active-turn { background: var(--t1-light); transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--t1-dark); }
    #scoreBox1.active-turn { background: var(--t2-light); transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--t2-dark); }

    /* ── DICE ── */
    .overlay { position: absolute; inset: 0; display: none; place-items: center; z-index: 30; }
    .overlay.show { display: grid; }
    .blurred { filter: blur(2px); }
    .dice-box {
      width: min(500px, 82vw); min-height: 320px;
      border: var(--border); border-radius: var(--radius);
      background: var(--white); box-shadow: 5px 5px 0 var(--ink);
      display: grid; place-items: center; transform: translateY(-120vh); transition: transform 0.22s ease;
    }
    .dice-box.down { transform: translateY(0); }
    .dice-box.up   { transform: translateY(-120vh); }
    .dice {
      width: 124px; aspect-ratio: 1; border-radius: 16px;
      background: var(--yellow); border: 3px solid var(--ink);
      display: grid; place-items: center;
      font-family: var(--ff-title); font-size: 66px; font-weight: 400;
      box-shadow: 5px 5px 0 var(--ink);
    }
    .dice.roll { animation: rattle 0.18s linear infinite; }
    .dice.pop  { animation: pop 0.35s ease; }
    @keyframes rattle {
      0%,100% { transform:translate(0,0) rotate(0); }
      25%     { transform:translate(-7px,5px) rotate(-9deg); }
      50%     { transform:translate(6px,-5px) rotate(8deg); }
      75%     { transform:translate(5px,6px) rotate(-5deg); }
    }
    @keyframes pop { 0% { transform:scale(1); } 50% { transform:scale(1.3); } 100% { transform:scale(1); } }

    /* ── MATCH VIEW ── */
    .match-view {
      position: absolute; inset: 0; display: none; place-items: center; z-index: 25;
      background: rgba(0,0,0,0.22);
    }
    .match-view.show { display: grid; }
    .big-cards { display: grid; grid-template-columns: repeat(2, minmax(200px,330px)); gap: clamp(20px, 5vw, 64px); }
    .big-card {
      min-height: 240px; border: var(--border); border-radius: var(--radius);
      background: var(--white); box-shadow: 5px 5px 0 var(--ink);
      padding: 20px; display: grid; grid-template-rows: 66px 1fr; gap: 6px; text-align: center;
      animation: zoomIn 0.2s ease;
    }
    .big-card.first-choice  { background: #fff4ee; border-color: #d46040; box-shadow: 5px 5px 0 #d46040; }
    .big-card.second-choice { background: #eef3ff; border-color: #4070d4; box-shadow: 5px 5px 0 #4070d4; }
    .big-card.flying { opacity:0; animation:none; transform:translate(var(--from-x),var(--from-y)) scale(0.22); }
    .big-card.flying.fly-in { animation: cardFlyIn 0.25s cubic-bezier(.17,.86,.24,1.08) forwards; }
    .big-card.fly-out       { animation: cardFlyOut 0.25s cubic-bezier(.55,.04,.72,.95) forwards; }
    .big-card .num  { font-family:var(--ff-title); font-size:clamp(30px,4.5vw,62px); font-weight:400; align-self:start; margin-top:-8px; }
    .big-card .word { font-family:var(--ff-body); font-size:clamp(22px,3vw,42px); font-weight:700; align-self:center; word-break:keep-all; }
    @keyframes zoomIn { from { transform:scale(0.65); opacity:0; } to { transform:scale(1); opacity:1; } }
    @keyframes cardFlyIn {
      0%   { transform:translate(var(--from-x),var(--from-y)) scale(0.22); opacity:0.25; }
      72%  { transform:translate(0,0) scale(1.06); opacity:1; }
      100% { transform:translate(0,0) scale(1); opacity:1; }
    }
    @keyframes cardFlyOut {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--from-x),var(--from-y)) scale(0.22); opacity:0; }
    }

    /* ── FEEDBACK ── */
    .flash {
      position: absolute; left:50%; top:45%;
      transform: translate(-50%,-150%) scale(1.25);
      font-family: var(--ff-title);
      font-size: clamp(60px, 11vw, 138px); font-weight: 400; letter-spacing: 0.04em;
      z-index: 35; opacity:0; pointer-events:none;
      -webkit-text-stroke: 5px var(--ink); paint-order: stroke fill;
    }
    .flash.right { color: #30c875; }
    .flash.wrong { color: var(--coral); }
    .flash.show  { animation: feedbackDrop 0.72s cubic-bezier(.17,.9,.27,1.15) forwards; }
    @keyframes feedbackDrop {
      0%   { transform:translate(-50%,-190%) scale(1.2); opacity:0; }
      28%  { transform:translate(-50%,-50%) scale(1.08); opacity:1; }
      78%  { transform:translate(-50%,-50%) scale(1); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(0.72); opacity:0; }
    }
    .burst-particle, .answer-ray { position:absolute; left:50%; top:45%; pointer-events:none; z-index:34; }
    .burst-particle {
      width:13px; height:13px; border-radius:50%; background: var(--coral); border: 2px solid var(--ink);
      animation: redBurst 0.68s ease-out forwards;
    }
    @keyframes redBurst {
      0%   { transform:translate(-50%,-50%) scale(0.3); opacity:1; }
      100% { transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(0); opacity:0; }
    }
    .answer-ray {
      width: clamp(110px,15vw,200px); height:10px; border-radius:999px;
      background: linear-gradient(90deg, transparent, #00d46a, transparent);
      transform-origin: left center; animation: greenRay 0.72s ease-out forwards;
    }
    @keyframes greenRay {
      0%   { transform:rotate(var(--angle)) scaleX(0); opacity:0; }
      22%  { opacity:1; }
      100% { transform:rotate(var(--angle)) scaleX(1.25); opacity:0; }
    }

    /* ── END ── */
    .end-banner {
      position: absolute; left:50%; bottom:-260px; transform: translateX(-50%);
      min-width: min(780px, 90vw); padding: 20px 36px;
      border-radius: var(--radius); background: var(--yellow);
      border: var(--border); box-shadow: 5px 5px 0 var(--ink);
      text-align: center; font-family: var(--ff-title);
      font-size: clamp(40px, 6.5vw, 84px); letter-spacing: 0.04em; z-index: 40;
    }
    .end-banner.show { animation: endShake 1.4s ease forwards; }
    @keyframes endShake {
      0%   { bottom:-260px; transform:translateX(-50%) rotate(0); }
      14%  { bottom:38%; transform:translateX(-50%) rotate(-8deg); }
      28%  { bottom:38%; transform:translateX(-50%) rotate(8deg); }
      42%  { bottom:38%; transform:translateX(-50%) rotate(-6deg); }
      70%  { bottom:38%; transform:translateX(-50%) rotate(5deg); }
      86%  { bottom:38%; transform:translateX(-50%) rotate(0); }
      100% { bottom:-260px; transform:translateX(-50%) rotate(0); }
    }

    .winner {
      position: absolute; inset:0; display: none; place-items: center; text-align: center;
      font-family: var(--ff-title); font-weight:400; z-index: 32;
    }
    .winner.show { display: grid; }
    .winner-content { display:grid; gap:20px; justify-items:center; }
    .winner-title {
      font-size: clamp(50px, 8.5vw, 110px); letter-spacing: 0.04em;
      color: var(--yellow); -webkit-text-stroke: 4px var(--ink); paint-order: stroke fill;
      filter: drop-shadow(4px 4px 0 var(--ink));
    }
    .mvp {
      padding: 10px 28px; border-radius: var(--radius); background: var(--white);
      border: var(--border); box-shadow: var(--shadow);
      font-family: var(--ff-body); font-size: clamp(20px, 3vw, 42px); font-weight: 400;
    }

    /* ── WORDBOOK ── */
    .wordbook {
      position: absolute; left:0; top:0; width: min(500px, 82vw); height:100vh;
      padding: clamp(16px, 2.4vw, 30px); background: var(--white);
      border-right: var(--border); box-shadow: 5px 0 0 var(--ink);
      transform: translateX(-110%); transition: transform 0.24s ease; z-index: 42;
      display: grid; grid-template-rows: auto 1fr; gap: 14px;
    }
    .wordbook.show { transform: translateX(0); }
    .wordbook h2 { font-family: var(--ff-title); font-size: clamp(26px, 3.5vw, 42px); font-weight:400; text-align: center; letter-spacing: 0.04em; }
    .wordbook-list { display:grid; gap:7px; align-content:start; overflow-y:auto; padding-right:4px; }
    .wordbook-list::-webkit-scrollbar { width:5px; }
    .wordbook-list::-webkit-scrollbar-thumb { background: rgba(46,42,38,0.3); border-radius: 3px; }
    .wordbook-pair {
      display: grid; grid-template-columns: minmax(0,1fr) auto minmax(0,1fr);
      gap: 9px; align-items: center; padding: 9px 12px;
      border-radius: var(--radius); border: var(--border3); background: var(--bg); box-shadow: var(--shadow3);
      font-size: clamp(12px, 1.4vw, 18px); font-weight: 400; word-break: keep-all;
    }
    .resume-wrap { z-index:46; }

    .remaining-badge {
      position: absolute; top:12px; right:16px; padding: 5px 14px;
      border-radius: var(--radius); background: var(--white);
      border: var(--border3); box-shadow: var(--shadow3);
      font-size: clamp(12px, 1.2vw, 16px); font-weight: 400; pointer-events:none; z-index:10;
    }
    .remaining-badge strong { color: var(--coral); }

    .confetti {
      position: absolute; top:-20px; width:11px; height:16px; border:2px solid var(--ink);
      opacity: 0.9; animation: fall linear forwards; z-index:31;
    }
    @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

    .ripple {
      position:fixed; width:34px; aspect-ratio:1; border-radius:50%; left:50%; top:50%;
      transform:translate(-50%,-50%) scale(0); opacity:0; pointer-events:none; z-index:80;
    }
    .ripple::before,
    .ripple::after {
      content:""; position:absolute; inset:0; border-radius:50%;
      border: 4px solid rgba(26,22,18,0.38);
      background: radial-gradient(circle, rgba(255,255,255,0.72) 0 18%, rgba(170,223,245,0.44) 19% 42%, rgba(240,192,48,0.24) 43% 58%, transparent 59%);
    }
    .ripple::after {
      border-color: rgba(74,144,217,0.36);
      animation-delay: 0.08s;
    }
    .ripple.run { animation: ripple 0.64s ease-out forwards; }
    .ripple.run::before,
    .ripple.run::after { animation: rippleRing 0.64s ease-out forwards; }
    @keyframes ripple {
      0%   { transform:translate(-50%,-50%) scale(0.7); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(38); opacity:0; }
    }
    @keyframes rippleRing {
      0%   { transform:scale(0.4); opacity:0.85; }
      58%  { opacity:0.32; }
      100% { transform:scale(1); opacity:0; }
    }

    .turn-popup { display:none; }
  </style>
</head>
<body>
<main class="app">
  <section id="start1" class="screen active">
    <h1 class="title">신나는 복습게임</h1>
    <p class="title-sub">몽골어 메모리 매칭</p>
    <div class="start-actions">
      <button id="playBtn" class="play-button" aria-label="시작"></button>
      <button id="practiceBtn" class="practice-button">연습</button>
    </div>
    <div id="ripple" class="ripple"></div>
  </section>

  <section id="practice" class="screen">
    <div class="practice-layout">
      <div id="practiceCount" class="practice-count">1 / 20</div>
      <div class="practice-card">
        <div id="practiceKo" class="practice-word"></div>
        <div class="practice-dash"></div>
        <div id="practiceMn" class="practice-word"></div>
      </div>
      <button id="exitPractice" class="exit-button">나가기</button>
    </div>
    <button id="practicePrev" class="practice-nav prev">&lt;</button>
    <button id="practiceNext" class="practice-nav next">&gt;</button>
  </section>

  <section id="start2" class="screen">
    <div class="panel absence-panel">
      <h2 class="panel-title">비참여자를 선택해 주세요</h2>
      <div id="roster" class="roster"></div>
      <button id="finishAbsence" class="primary" style="justify-self:center;">선택 완료</button>
    </div>
  </section>

  <section id="transition" class="screen">
    <div id="wipe" class="wipe"></div>
  </section>

  <section id="start4" class="screen">
    <div id="teamsWrap" class="teams-wrap">
      <article class="team-box"><h2 id="team1Title">1팀</h2><div id="team1List" class="team-list"></div></article>
      <article class="team-box"><h2 id="team2Title">2팀</h2><div id="team2List" class="team-list"></div></article>
    </div>
    <div id="teamConfirmWrap" class="bottom-action">
      <button id="teamConfirm" class="primary">확인했습니다!</button>
    </div>
  </section>

  <section id="start5" class="screen">
    <div id="rulesPanel" class="panel rules-panel">
      <h2 class="panel-title">게임 설명</h2>
      <ol>
        <li>카드에 적힌 숫자를 두개 외쳐 카드를 오픈하자!</li>
        <li>카드의 한국어 - 몽골 발음이 일치하면 점수 획득!</li>
        <li>카드의 내용을 잘 기억하고 일치하는 카드를 고르자!</li>
        <li>정답을 맞추면 기회 1번 더 획득! 추가 기회는 최대 2회!</li>
        <li id="diceRule">주사위가 1,3,5가 나오면 1팀이, 2,4,6이 나오면 2팀이 먼저 선택!</li>
      </ol>
    </div>
    <div id="rulesConfirmWrap" class="bottom-action">
      <button id="rulesConfirm" class="primary">확인했습니다!</button>
    </div>
  </section>

  <section id="game" class="screen">
    <div id="remainingBadge" class="remaining-badge">남은 쌍 <strong id="remainingCount">20</strong></div>
    <div id="gameLayout" class="game-layout">
      <div id="turnMessage" class="turn-message"></div>
      <div id="cardGrid" class="card-grid"></div>
      <div id="scoreboard" class="scoreboard">
        <div class="score" id="scoreBox0"><span id="scoreTeam1">1팀</span><span id="score1">0점</span></div>
        <div class="score" id="scoreBox1"><span id="scoreTeam2">2팀</span><span id="score2">0점</span></div>
      </div>
    </div>
    <div id="turnBand" class="turn-band"></div>
    <div id="diceOverlay" class="overlay">
      <div id="diceBox" class="dice-box"><div id="dice" class="dice">?</div></div>
    </div>
    <div id="matchView" class="match-view"><div id="bigCards" class="big-cards"></div></div>
    <div id="flash" class="flash">정답!</div>
    <aside id="wordbook" class="wordbook">
      <h2>단어장</h2>
      <div id="wordbookList" class="wordbook-list"></div>
    </aside>
    <div id="resumeWrap" class="bottom-action resume-wrap"><button id="resumeGame" class="primary">게임 재개</button></div>
    <div id="endBanner" class="end-banner">게임 끝!</div>
    <div id="winner" class="winner"></div>
    <div id="restartWrap" class="bottom-action"><button id="restart" class="primary">처음으로</button></div>
  </section>
</main>

<script>
const people=[
  ["91","최원석","남"],["95","김지은","여"],["95","이찬미","여"],["95","한수호","남"],["95","이예진","여"],
  ["97","이예슬","여"],["97","함유빈","여"],["98","김영진","남"],["98","유희원","여"],["99","최예담","여"],
  ["00","권오준","남"],["00","이우주","남"],["01","김완재","남"],["01","한예진","여"],
  ["02","곽도영","남"],["02","김승민","남"],["03","김우림","남"],["04","최정현","남"],
  ["05","김범서","남"],["05","남시은","여"],["05","우성원","남"],
  ["06","김지원","여"],["06","노시온","남"],["07","김지원","여"],["07","이예현","여"],["07","김용빈","남"],["07","이형준","남"]
].map(([year,name,gender],index)=>({id:index,year,name,gender,label:`${year}${name}`}));

const pairs=[
  ["맛있다","암트태"],["예쁘다","흐-르흥"],["잘하고있어요","새응 히즈 밴"],["일어나세요","버서-래"],
  ["앉으세요","소-가-래"],["조금만 기다려 주세요","조흥 훌레게레"],["함께 사진찍자","함트 조르가"],["시작합니다","고로와 이크"],
  ["말을 따라 하세요","다갓 헬레래"],["조심하세요","볼곰쥬때 배가래"],["1 (하나)","넥(닉)"],["2 (둘)","호요르(허요르)"],
  ["3 (셋)","고로(고롭)"],["4 (넷)","두루브(두릅)"],["5 (다섯)","타우(탑)"],["6 (여섯)","조르가"],
  ["7 (일곱)","덜러"],["8 (여덟)","나임"],["9 (아홉)","유스"],["10 (열)","아롭(아롱)"]
];

const state={
  absent:new Set(),teams:[[],[]],teamNames:["1팀","2팀"],teamLeaders:[null,null],
  cards:[],selected:[],scores:[0,0],firstTeam:0,turnTeam:0,teamPointers:[0,0],
  bonusStreak:0,playerMatches:{},wrongStreak:0,practiceIndex:0,
  dealing:false,dealtCount:40,locked:false,preview:true
};

const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const birthYear=y=>Number(y)>=50?1900+Number(y):2000+Number(y);
const compareAge=(a,b)=>birthYear(a.year)-birthYear(b.year)||a.name.localeCompare(b.name,"ko");
const teamName=i=>state.teamNames[i]||`${i+1}팀`;
const givenNameTeam=(p,fb)=>p?`${p.name.slice(1)||p.name}팀`:fb;

function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");}

function renderRoster(){
  $("roster").innerHTML="";
  people.slice().sort(compareAge).forEach(person=>{
    const btn=document.createElement("button");
    btn.className=`person ${person.gender==="남"?"male":"female"}`;
    btn.textContent=person.label;
    btn.addEventListener("click",()=>{
      if(state.absent.has(person.id))state.absent.delete(person.id);
      else state.absent.add(person.id);
      btn.classList.toggle("absent",state.absent.has(person.id));
    });
    $("roster").appendChild(btn);
  });
}

function openPractice(){state.practiceIndex=0;renderPractice();show("practice");}
function renderPractice(){
  const p=pairs[state.practiceIndex];
  $("practiceKo").textContent=p[0];$("practiceMn").textContent=p[1];
  $("practiceCount").textContent=`${state.practiceIndex+1} / ${pairs.length}`;
}
function movePractice(d){state.practiceIndex=(state.practiceIndex+d+pairs.length)%pairs.length;renderPractice();}
function closePractice(){show("start1");}

function makeTeams(){
  const active=people.filter(p=>!state.absent.has(p.id)).sort(compareAge);
  const teams=[[],[]];
  active.forEach(person=>{
    const score=t=>{const sg=t.filter(m=>m.gender===person.gender).length;const na=t.filter(m=>Math.abs(birthYear(m.year)-birthYear(person.year))<=2).length;return t.length*3+sg*2+na;};
    teams[score(teams[0])<=score(teams[1])?0:1].push(person);
  });
  state.teams=teams;state.teamPointers=[0,0];
}
function chooseTeamLeaders(){
  state.teamLeaders=state.teams.map(t=>t.length?t[Math.floor(Math.random()*t.length)]:null);
  state.teamNames=state.teamLeaders.map((l,i)=>givenNameTeam(l,`${i+1}팀`));
}
function renderTeams(){
  $("team1Title").textContent=teamName(0);$("team2Title").textContent=teamName(1);
  ["team1List","team2List"].forEach((id,ti)=>{
    $(id).innerHTML="";
    state.teams[ti].sort(compareAge).forEach(person=>{
      const div=document.createElement("div");div.className="team-member";
      if(state.teamLeaders[ti]&&state.teamLeaders[ti].id===person.id)div.classList.add("team-leader");
      div.textContent=person.label;$(id).appendChild(div);
    });
  });
}

async function runWipe(msg,next,teamIndex=null){
  show("transition");const w=$("wipe");
  w.className="wipe enter";
  if(teamIndex===0)w.classList.add("team-one");
  else if(teamIndex===1)w.classList.add("team-two");
  w.textContent=msg;await sleep(1000);
  w.textContent="";await sleep(300);w.className="wipe exit";await sleep(220);w.className="wipe";if(next)next();
}
async function runCaptainWipe(next){
  show("transition");const w=$("wipe");w.className="wipe enter";w.textContent="팀명 정하는 중";await sleep(900);
  w.textContent="";await sleep(220);w.className="wipe exit";await sleep(220);w.className="wipe";if(next)next();
}
async function goTeams(){
  makeTeams();
  await runWipe("팀 생성 중",async()=>{
    state.teamNames=["1팀","2팀"];state.teamLeaders=[null,null];
    renderTeams();show("start4");$("teamsWrap").className="teams-wrap";$("teamConfirmWrap").classList.remove("show");
    await sleep(30);$("teamsWrap").classList.add("down");await sleep(1500);
    $("teamsWrap").className="teams-wrap up";await sleep(220);chooseTeamLeaders();
    await runCaptainWipe(async()=>{
      renderTeams();show("start4");$("teamsWrap").className="teams-wrap";$("teamConfirmWrap").classList.remove("show");
      await sleep(30);$("teamsWrap").classList.add("down");await sleep(230);$("teamConfirmWrap").classList.add("show");
    });
  });
}
async function goRules(){
  $("teamConfirmWrap").classList.remove("show");$("teamsWrap").className="teams-wrap up";await sleep(220);
  show("start5");updateDiceRule();$("rulesPanel").className="panel rules-panel";$("rulesConfirmWrap").classList.remove("show");
  await sleep(30);$("rulesPanel").classList.add("down");await sleep(1000);$("rulesConfirmWrap").classList.add("show");
}
function updateDiceRule(){$("diceRule").textContent=`주사위가 1,3,5가 나오면 ${teamName(0)}이, 2,4,6이 나오면 ${teamName(1)}이 먼저 선택!`;}

function shuffle(arr){const c=[...arr];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;}
function updateRemainingBadge(){$("remainingCount").textContent=pairs.length-state.cards.filter(c=>c.matched).length/2;}

function setupCards(deal=false){
  state.cards=shuffle(pairs.flatMap((pair,pairId)=>[{pairId,type:"ko",text:pair[0]},{pairId,type:"mn",text:pair[1]}])).map((card,i)=>({...card,number:i+1,matched:false}));
  state.selected=[];state.scores=[0,0];state.bonusStreak=0;state.playerMatches={};state.wrongStreak=0;
  state.dealing=deal;state.dealtCount=deal?0:40;state.locked=true;state.preview=true;
  updateScores();renderCards();updateRemainingBadge();$("turnMessage").textContent="";
}

function renderCards(){
  const grid=$("cardGrid");grid.innerHTML="";
  state.cards.forEach(card=>{
    const btn=document.createElement("button");btn.className="memory-card";btn.dataset.number=card.number;
    btn.textContent=card.matched?card.text:card.number;
    if(state.dealing){btn.classList.add("deal-ready");if(card.number<=state.dealtCount)btn.classList.add("dealt");}
    const si=state.selected.indexOf(card.number);
    if(si!==-1)btn.classList.add("selected",si===0?"selected-first":"selected-second");
    if(card.matched)btn.classList.add("revealed","locked");
    btn.addEventListener("click",()=>selectCard(card.number));
    grid.appendChild(btn);
  });
}

function updateScores(){
  $("scoreTeam1").textContent=teamName(0);$("scoreTeam2").textContent=teamName(1);
  $("score1").textContent=`${state.scores[0]}점`;$("score2").textContent=`${state.scores[1]}점`;
  $("scoreBox0").classList.toggle("active-turn",state.turnTeam===0&&!state.locked);
  $("scoreBox1").classList.toggle("active-turn",state.turnTeam===1&&!state.locked);
}

async function startGame(){
  $("rulesConfirmWrap").classList.remove("show");show("game");
  $("winner").classList.remove("show");$("restartWrap").classList.remove("show");
  hideWordbook();clearConfetti();clearFeedbackEffects();
  setupCards(true);await dealCardsAnimation();await sleep(500);await rollDice();
}

async function dealCardsAnimation(){
  for(let n=1;n<=40;n++){state.dealtCount=n;const c=document.querySelector(`.memory-card[data-number="${n}"]`);if(c)c.classList.add("dealt");await sleep(50);}
  await sleep(280);state.dealing=false;document.querySelectorAll(".memory-card").forEach(c=>c.classList.remove("deal-ready","dealt"));
}

async function rollDice(){
  $("gameLayout").classList.add("blurred");$("diceOverlay").classList.add("show");
  $("diceBox").className="dice-box";$("dice").className="dice";$("dice").textContent="?";
  await sleep(30);$("diceBox").classList.add("down");await sleep(350);$("dice").classList.add("roll");
  const faces=[1,2,3,4,5,6];
  const timer=setInterval(()=>{$("dice").textContent=faces[Math.floor(Math.random()*faces.length)];},90);
  await sleep(1400);clearInterval(timer);
  const result=faces[Math.floor(Math.random()*faces.length)];
  state.firstTeam=[1,3,5].includes(result)?0:1;state.turnTeam=state.firstTeam;
  $("dice").className="dice pop";$("dice").textContent=result;await sleep(500);
  await runWipe(`${teamName(state.firstTeam)} 먼저 선택!`, ()=>{}, state.firstTeam);
  show("game");await sleep(100);$("diceBox").className="dice-box up";await sleep(220);
  $("diceOverlay").classList.remove("show");$("gameLayout").classList.remove("blurred");
  state.locked=false;state.preview=false;renderCards();setTurnMessage(true);updateScores();
}

function currentPlayer(){const team=state.teams[state.turnTeam];if(!team.length)return"팀원";return team[state.teamPointers[state.turnTeam]%team.length].label;}

function setTurnMessage(animated=true){
  const text=`${teamName(state.turnTeam)}의 ${currentPlayer()} 선택해주세요`;
  const msg=$("turnMessage");
  msg.textContent=text;
  msg.classList.remove("team-one","team-two");
  msg.classList.add(state.turnTeam===0?"team-one":"team-two");
  if(!animated)return;
  const band=$("turnBand");band.textContent=text;
  band.classList.remove("show","team-one","team-two");
  band.classList.add(state.turnTeam===0?"team-one":"team-two");
  void band.offsetWidth;band.classList.add("show");window.setTimeout(()=>band.classList.remove("show"),1520);
}

function advanceTurn(){state.teamPointers[state.turnTeam]+=1;state.turnTeam=state.turnTeam===0?1:0;state.bonusStreak=0;setTurnMessage(true);updateScores();}
function stayForBonus(){state.bonusStreak+=1;setTurnMessage(true);}

function selectCard(number){
  if(state.locked||state.preview)return;
  const card=state.cards.find(c=>c.number===number);
  if(!card||card.matched||state.selected.includes(number))return;
  state.selected.push(number);renderCards();if(state.selected.length===2)resolveSelection();
}

async function resolveSelection(){
  state.locked=true;const scorer=currentPlayer();await sleep(220);
  const chosen=state.selected.map(n=>state.cards.find(c=>c.number===n));
  showBigCards(chosen);await sleep(1200);
  const isMatch=chosen[0].pairId===chosen[1].pairId&&chosen[0].type!==chosen[1].type;
  if(isMatch){
    state.wrongStreak=0;playFeedback("right");await sleep(760);await hideBigCards(true);
    chosen.forEach(c=>c.matched=true);state.scores[state.turnTeam]+=5;
    state.playerMatches[scorer]=(state.playerMatches[scorer]||0)+1;
    updateScores();updateRemainingBadge();state.selected=[];renderCards();
    if(state.cards.every(c=>c.matched)){await finishGame();return;}
    if(state.bonusStreak<1)stayForBonus();else advanceTurn();
  } else {
    state.wrongStreak+=1;playFeedback("wrong");await sleep(760);await hideBigCards(true);
    state.selected=[];renderCards();advanceTurn();
    if(state.wrongStreak>=20){await showWordbook();return;}
  }
  state.locked=false;updateScores();
}

function showBigCards(cards){
  const origins=cards.map(card=>{const src=document.querySelector(`.memory-card[data-number="${card.number}"]`);return src?src.getBoundingClientRect():null;});
  $("bigCards").innerHTML="";
  cards.forEach((card,i)=>{
    const div=document.createElement("div");div.className=`big-card ${i===0?"first-choice":"second-choice"} flying`;
    div.innerHTML=`<div class="num">${card.number}</div><div class="word">${card.text}</div>`;$("bigCards").appendChild(div);
  });
  $("matchView").classList.add("show");
  Array.from($("bigCards").children).forEach((el,i)=>{
    const origin=origins[i];if(!origin){el.classList.remove("flying");return;}
    const target=el.getBoundingClientRect();
    el.style.setProperty("--from-x",`${origin.left+origin.width/2-(target.left+target.width/2)}px`);
    el.style.setProperty("--from-y",`${origin.top+origin.height/2-(target.top+target.height/2)}px`);
    void el.offsetWidth;el.classList.add("fly-in");
  });
}

async function hideBigCards(animated=false){
  if(animated&&$("matchView").classList.contains("show")){
    Array.from($("bigCards").children).forEach(el=>{el.classList.remove("fly-in");el.classList.add("fly-out");});await sleep(250);
  }
  $("matchView").classList.remove("show");$("bigCards").innerHTML="";
}

function playFeedback(type){
  clearFeedbackEffects();const flash=$("flash");
  flash.textContent=type==="right"?"정답!":"땡!";flash.className=`flash ${type==="right"?"right":"wrong"}`;
  void flash.offsetWidth;flash.classList.add("show");
  if(type==="right")makeAnswerRays();else makeWrongParticles();window.setTimeout(clearFeedbackEffects,900);
}

function makeWrongParticles(){
  const app=document.querySelector(".app");
  for(let i=0;i<34;i++){
    const p=document.createElement("div");p.className="burst-particle feedback-effect";
    const a=(Math.PI*2*i)/34,d=90+Math.random()*190;
    p.style.setProperty("--x",`${Math.cos(a)*d}px`);p.style.setProperty("--y",`${Math.sin(a)*d}px`);
    p.style.animationDelay=`${Math.random()*0.08}s`;app.appendChild(p);
  }
}

function makeAnswerRays(){
  const app=document.querySelector(".app");
  for(let i=0;i<18;i++){
    const ray=document.createElement("div");ray.className="answer-ray feedback-effect";
    ray.style.setProperty("--angle",`${i*20}deg`);ray.style.animationDelay=`${Math.random()*0.08}s`;app.appendChild(ray);
  }
}

function clearFeedbackEffects(){$("flash").className="flash";document.querySelectorAll(".feedback-effect").forEach(e=>e.remove());}

async function finishGame(){
  state.locked=true;$("turnMessage").textContent="";
  $("endBanner").classList.add("show");await sleep(1600);
  const winnerText=state.scores[0]===state.scores[1]?"무승부!":`${teamName(state.scores[0]>state.scores[1]?0:1)} 승리!`;
  $("winner").innerHTML=`<div class="winner-content"><div class="winner-title">${winnerText}</div><div class="mvp">MVP: ${getMvp()}</div></div>`;
  $("winner").classList.add("show");makeConfetti();await sleep(3000);$("restartWrap").classList.add("show");
}

function getMvp(){
  const entries=Object.entries(state.playerMatches);if(!entries.length)return"없음";
  entries.sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0],"ko"));const[name,count]=entries[0];return`${name} (${count*5}점)`;
}

async function showWordbook(){
  state.locked=true;renderWordbook();$("wordbook").classList.add("show");$("resumeWrap").classList.remove("show");
  await sleep(1000);$("resumeWrap").classList.add("show");
}

function renderWordbook(){
  const list=$("wordbookList");list.innerHTML="";
  pairs.forEach(pair=>{
    const row=document.createElement("div");row.className="wordbook-pair";
    row.innerHTML=`<span>${pair[0]}</span><span>—</span><span>${pair[1]}</span>`;list.appendChild(row);
  });
}

function hideWordbook(){$("wordbook").classList.remove("show");$("resumeWrap").classList.remove("show");}
function resumeGame(){hideWordbook();state.wrongStreak=0;state.locked=false;updateScores();}

function makeConfetti(){
  clearConfetti();const colors=["#ff6b6b","#ffe135","#7dd8f8","#5fe0b0","#c4a8ff","#ff9f43","#54a0ff","#ffb8d9"];
  for(let i=0;i<120;i++){
    const p=document.createElement("div");p.className="confetti";
    p.style.left=`${Math.random()*100}vw`;p.style.background=colors[i%colors.length];
    p.style.animationDuration=`${2.2+Math.random()*2.4}s`;p.style.animationDelay=`${Math.random()*1.2}s`;
    document.querySelector(".app").appendChild(p);
  }
}

function clearConfetti(){document.querySelectorAll(".confetti").forEach(p=>p.remove());}

function resetAll(){
  state.absent.clear();state.teams=[[],[]];state.teamNames=["1팀","2팀"];state.teamLeaders=[null,null];
  state.cards=[];state.selected=[];state.scores=[0,0];state.teamPointers=[0,0];state.bonusStreak=0;
  state.playerMatches={};state.wrongStreak=0;state.locked=false;
  $("winner").classList.remove("show");$("restartWrap").classList.remove("show");$("endBanner").classList.remove("show");
  hideWordbook();clearConfetti();clearFeedbackEffects();renderRoster();show("start1");
}

$("playBtn").addEventListener("click",async()=>{
  const r=$("playBtn").getBoundingClientRect();const ripple=$("ripple");
  ripple.style.left=`${r.left+r.width/2}px`;ripple.style.top=`${r.top+r.height/2}px`;
  ripple.classList.remove("run");void ripple.offsetWidth;ripple.classList.add("run");await sleep(640);show("start2");
});
$("finishAbsence").addEventListener("click",goTeams);
$("teamConfirm").addEventListener("click",goRules);
$("rulesConfirm").addEventListener("click",startGame);
$("restart").addEventListener("click",resetAll);
$("resumeGame").addEventListener("click",resumeGame);
$("practiceBtn").addEventListener("click",openPractice);
$("practicePrev").addEventListener("click",()=>movePractice(-1));
$("practiceNext").addEventListener("click",()=>movePractice(1));
$("exitPractice").addEventListener("click",closePractice);
document.addEventListener("keydown",e=>{
  if(!$("practice").classList.contains("active"))return;
  if(e.key==="ArrowLeft")movePractice(-1);if(e.key==="ArrowRight")movePractice(1);if(e.key==="Escape")closePractice();
});

renderRoster();
</script>
</body>
</html>
